# Tiny Tapeout project information
project:
  title:        "3x3 Gaussian Convolution Engine"
  author:       "Cyrill Rüttimann"
  discord:      ""
  description:  "A compact 1-channel 3x3 Gaussian convolution kernel inspired by Exercise 08 (VLSI 1)."
  language:     "Verilog"
  clock_hz:     50000000

  tiles: "1x1"

  top_module:  "tt_um_ex08_conv3x3"

  source_files:
    - "tt_um_ex08_conv3x3.v"
    - "convtop.v"
    - "convcomp.v"

pinout:
  # Inputs
  ui[0]: "pixel_bit0"
  ui[1]: "pixel_bit1"
  ui[2]: "pixel_bit2"
  ui[3]: "pixel_bit3"
  ui[4]: "pixel_bit4"
  ui[5]: "pixel_bit5"
  ui[6]: "pixel_bit6"
  ui[7]: "pixel_bit7"

  # Outputs
  uo[0]: "result_bit0"
  uo[1]: "result_bit1"
  uo[2]: "result_bit2"
  uo[3]: "result_bit3"
  uo[4]: "result_bit4"
  uo[5]: "result_bit5"
  uo[6]: "result_bit6"
  uo[7]: "result_bit7"

  # Bidirectional pins (control/status)
  uio[0]: "load_window"   # host sets 0x01 while streaming 9 pixels
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change
yaml_version: 6
